<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - CallForge AI</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav>
  <div class="logo">CallForge AI</div>
  <button onclick="logout()" class="btn-secondary">Logout</button>
</nav>

<section class="dashboard-container">

  <!-- USER INFO -->
  <div class="dashboard-card">
    <h2>Account Overview</h2>
    <p><strong>Email:</strong> <span id="userEmail">Loading...</span></p>
    <p><strong>Plan:</strong> <span id="userPlan">Loading...</span></p>
    <p><strong>Expiry:</strong> <span id="planExpiry">Loading...</span></p>
  </div>

  <!-- STATS -->
  <div class="dashboard-grid">
    <div class="dashboard-card">
      <h3>Daily Call Limit</h3>
      <h1 id="dailyLimit">0</h1>
    </div>

    <div class="dashboard-card">
      <h3>Calls Used Today</h3>
      <h1 id="callsUsed">0</h1>
    </div>

    <div class="dashboard-card">
      <h3>Calls Remaining</h3>
      <h1 id="callsRemaining">0</h1>
    </div>
  </div>

  <!-- CALL SECTION -->
  <div class="dashboard-card">
    <h2>Make a Call</h2>
    <input type="text" id="callNumber" placeholder="Enter Phone Number (+91XXXXXXXXXX)">
    <button onclick="makeCall()" class="btn-primary full">Start Call</button>
  </div>

  <!-- UPGRADE SECTION -->
  <div class="dashboard-card">
    <h2>Upgrade Plan</h2>
    <button onclick="upgradePlan('pro1999')" class="btn-secondary">Upgrade ₹1999</button>
    <button onclick="upgradePlan('pro3999')" class="btn-primary">Upgrade ₹3999</button>
  </div>

</section>

<script src="js/dashboard.js"></script>
</body>
</html>
